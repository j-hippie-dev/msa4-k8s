apiVersion: apps/v1  # 파드들의 명칭 'apps' 생략 가능
kind: Deployment
metadata:  # Deployment 기본정보
  name: nginx-deployment  # Deployment명
spec:  # Deployment 상세정보
  replicas: 2  # 생성할 피드의 복제본 개수
  selector:
    matchLabels:
      app: nginx-app  # `spec.template.metadata.labels.app`과 동일한 값을 설정  # Pod의 레이블과 동일한 이름을 설정해줘야 연결됨
  template:  # 배포할 Pod를 정의
    metadata:
      labels:  # 생성할 Pod의 레이블을 정의
        app: nginx-app
    spec:
      containers:
      - name: nginx-container  # 생성할 컨테이너명
        image: nginx:latest  # 컨테이너 생성시 사용할 이미지
        imagePullPolicy: IfNotPresent  # 해당 이미지 로컬에서 먼저 pull 시도하고, 없으면 레지스트리(로컬/클라우드)에서 pull
        resources:  # 생성할 리소스가 사용할 하드웨어 리소스를 설정
          requests:  # 생성할 리소스가 사용할 최소 보장 자원
            memory: "128Mi"
            cpu: "250m"
          limits:  # 생성할 리소스가 사용할 최대 자원
            memory: "256Mi"
            cpu: "500m"
        ports:
          - containerPort: 80  # 해당 컨테이너가 사용할 포트 설정
